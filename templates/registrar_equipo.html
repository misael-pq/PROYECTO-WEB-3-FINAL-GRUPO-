<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Equipo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Registrar Equipo</h3>
                </div>

                <div class="card-body">

                    <form id="formEquipo">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" id="nombre" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Marca</label>
                            <input type="text" id="marca" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Modelo</label>
                            <input type="text" id="modelo" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea id="descripcion"
                                      class="form-control"
                                      rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">ID Categoría</label>
                            <input type="number"
                                   id="id_categoria"
                                   class="form-control">
                        </div>

                        <div class="d-flex justify-content-between">

                            <button type="button"
                                    class="btn btn-success"
                                    onclick="registrarEquipo()">
                                Guardar
                            </button>

                            <button type="button"
                                    class="btn btn-secondary"
                                    onclick="window.location.href='/equipos_html'">
                                Cancelar
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
</body>
<script>
    const token = localStorage.getItem("token");
function registrarEquipo(){

    if(!token){
        alert("No hay sesión activa");
        window.location.href = "/login";
        return;
    }
    console.log("Registrando equipo...");


    fetch('/equipos', {

        method: 'POST',
         headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
        },

        body: JSON.stringify({

            nombre: document.getElementById('nombre').value,
            marca: document.getElementById('marca').value,
            modelo: document.getElementById('modelo').value,
            descripcion: document.getElementById('descripcion').value,
            id_categoria: document.getElementById('id_categoria').value

        })

    })
    .then(res => {
        if(res.status === 401){

    localStorage.setItem(
        "pagina_anterior","/equipos_html" );

    alert("Sesión expirada. Inicia sesión nuevamente.");
    localStorage.removeItem("token");
    window.location.href = "/login";

    return;
}
        return res.json();
    })
    .then(data => {
        alert(data.mensaje || data.msg);
       window.location.href = "/equipos_html";
    })
    .catch(err => console.log(err));
}
</script>
