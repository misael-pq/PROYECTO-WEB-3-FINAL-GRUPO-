<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Devoluciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

    <div class="container-fluid">
    <a class="navbar-brand" href="#"></a>
    <div class="navbar-nav">

    <div class="container mt-5">
        <div class="mb-3 d-flex justify-content-between align-items-center">
            <div>
                <a href="/" class="btn btn-secondary">Volver al Inicio</a>
            </div>

      <a class="nav-link active" href="/devoluciones_html">Devoluciones</a>

    </div>
  </div>

<body class="bg-secondary-subtle">

<div class="container mt-5">
<h1 class="text-center mb-4" id="titulo">
        Préstamos Activos
    </h1>
    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered table-hover">
                <thead class="table-dark text-center">
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Equipo</th>
                        <th>Fecha Préstamo</th>
                        <th>Fecha Prevista</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-prestamos"></tbody>
            </table>
        </div>
    </div>
</div>

<script>

const tabla = document.getElementById('tabla-prestamos');
const titulo = document.getElementById('titulo');

fetch('/prestamos_activos')
.then(response => response.json())
.then(data => {

    titulo.textContent = `Préstamos Activos (${data.length})`;

    if(data.length === 0){
        tabla.innerHTML = `
        <tr>
            <td colspan="6" class="text-center">
                No existen préstamos activos
            </td>   
        </tr>`;
        return;
    }

    data.forEach(prestamo => {

        tabla.innerHTML += `
        <tr>
            <td class="text-center">${prestamo.id_prestamo}</td>
            <td>${prestamo.usuario}</td>
            <td>${prestamo.equipo}</td>
            <td class="text-center">${prestamo.fecha_prestamo}</td>
            <td class="text-center">${prestamo.fecha_devolucion_prevista}</td>
            <td class="text-center">
                <button
                    class="btn btn-success btn-sm"
                    onclick="devolver(${prestamo.id_prestamo})">
                    Registrar Devolución
                </button>
            </td>
        </tr>
        `;
    });

})
.catch(error => {
    tabla.innerHTML = `
    <tr>
        <td colspan="6" class="text-center text-danger">
            Error al cargar los préstamos
        </td>
    </tr>`;
    console.log(error);
});

function devolver(id){

    if(!confirm("¿Registrar devolución del equipo?")){
        return;
    }

    fetch('/devoluciones/' + id,{
        method:'PUT'
    })
    .then(response => response.json())
    .then(data => {
        //alert(data.mensaje);
        location.reload();
    })
    .catch(error => {
        alert("Error al registrar la devolución");
        console.log(error);
    });
}

</script>

</body>
</html>
