<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    
</head>
<body>

<div class="login-box">

    <h2>Iniciar Sesión</h2>

    <input type="text" id="username" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="iniciarSesion()">
        Ingresar
    </button>

</div>
<style>
body{
    margin: 0;
    font-family: Arial;
    background: #f2f2f2;

    /* 🔥 CENTRAR TODO */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box{
    width: 320px;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);

    display: flex;
    flex-direction: column;
    align-items: center;
}

.login-box h2{
    margin-bottom: 20px;
}

.login-box input{
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.login-box button{
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.login-box button:hover{
    background: #0056b3;
}
</style>

<script>
function iniciarSesion(){

    fetch('/login', {
        method: 'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
    })
    .then(res => res.json())
    .then(data => {
    console.log("TOKEN:", data.access_token);
    console.log("PAGINA:", localStorage.getItem("pagina_anterior"));


    if(!data.access_token){
        alert("Usuario o contraseña incorrectos");
        return;
    }

    localStorage.setItem('token', data.access_token);

    const pagina = localStorage.getItem('pagina_anterior');

    console.log("Página destino:", pagina);

    if (pagina) {
        localStorage.removeItem('pagina_anterior');
        window.location.href = pagina;
    } else {
        window.location.href = '/';
    }
});
}
</script>
</body>
</html>
