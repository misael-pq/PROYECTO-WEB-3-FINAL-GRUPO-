<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control - Solicitudes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="mb-3 d-flex justify-content-between align-items-center">
            <div>
                <a href="/" class="btn btn-secondary">Volver al Inicio</a>
            </div>
            <div>
                <span class="fw-bold me-2">Filtrar por Estado:</span>
                <button class="btn btn-outline-dark btn-sm" onclick="cargarTabla('/solicitudes')">Todos</button>
                <button class="btn btn-outline-warning btn-sm" onclick="cargarTabla('/solicitudes/estado/Pendiente')">Pendientes</button>
                <button class="btn btn-outline-success btn-sm" onclick="cargarTabla('/solicitudes/estado/Aprobada')">Aprobadas</button>
            </div>
        </div>
       
        <h1 class="text-center mb-4">Gestion de Solicitudes</h1>
        
        <div class="card shadow p-4">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Equipo</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Opciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-solicitudes"></tbody>
            </table>
        </div>
    </div>

    <script>
          const token = localStorage.getItem('token');
if (!token) {

    localStorage.setItem("pagina_anterior",window.location.pathname);

    window.location.href = "/login";
}
        function cargarTabla(ruta) {
            fetch(ruta, {
                method: 'GET',
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(response => response.json())
            .then(data => {
                const tabla = document.getElementById('tabla-solicitudes');
                tabla.innerHTML = '';
                if(data.msg) {
                    tabla.innerHTML = `<tr><td colspan="6" class="text-center text-danger fw-bold">${data.msg} (Por favor inicia sesión)</td></tr>`;
                    return;
                }

                data.forEach(s => {
                    tabla.innerHTML += `
                        <tr>
                            <td>${s.id_solicitud}</td>
                            <td>${s.usuario}</td>
                            <td>${s.equipo}</td>
                            <td>${s.fecha_solicitud}</td>
                            <td><b>${s.estado}</b></td>
                            <td>
                                <button class="btn btn-success btn-sm" onclick="cambiarEstado(${s.id_solicitud}, 'Aprobada')"> Aprobar </button>
                                <button class="btn btn-warning btn-sm" onclick="cambiarEstado(${s.id_solicitud}, 'Rechazada')"> Rechazar </button>
                                <button class="btn btn-danger btn-sm" onclick="eliminarSolicitud(${s.id_solicitud})"> Eliminar </button>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(error => console.error('Error:', error));
        }
        cargarTabla('/solicitudes');

        function cambiarEstado(id, nuevoEstado) {
            console.log("Botón presionado", id, nuevoEstado);
             const token = localStorage.getItem("token");

    if(!token){
        alert("No hay sesión activa");
        window.location.href = "/login";
        return;
    }
            const confirmar = confirm("¿Está seguro de cambiar el estado a " + nuevoEstado + "?");
            if(!confirmar){
                return;
            }

            fetch('/solicitudes/' + id, {
                method: 'PUT',
                headers: {
                     "Content-Type": "application/json",
                    "Authorization": "Bearer " + localStorage.getItem("token")
                },
                body: JSON.stringify({ estado: nuevoEstado })
            })
            .then(res => {
        if(res.status === 401){

    localStorage.setItem(
        "pagina_anterior",
        "/prestamos_html"
    );

    alert("Inicie sesión nuevamente y vuelva a presionar Aprobar/Rechazar.");
    localStorage.removeItem("token");
    window.location.href = "/login";

    return;
}
        return res.json();
    })
    .then(data => {
        alert(data.mensaje || data.msg);
       cargarTabla('/solicitudes');
    })
    .catch(err => console.log(err));
        }
        function eliminarSolicitud(id) {
            const token = localStorage.getItem("token");

    if(!token){
        alert("No hay sesión activa");
        window.location.href = "/login";
        return;
    }
            const confirmar = confirm("¿Está seguro de eliminar la solicitud?");
            if(!confirmar){
                return;
            }

            fetch('/solicitudes/' + id, {
                method: 'DELETE',
                headers: {'Authorization': 'Bearer ' + token}
            })
            .then(res => {
    if(res.status === 401){
        localStorage.setItem(
            "pagina_anterior",
            "/prestamos_html"
        );
        alert("Inicie sesión nuevamente y vuelva a presionar Eliminar.");
        localStorage.removeItem("token");
        window.location.href = "/login";
        return;
    }
    return res.json();
})
.then(data => {
        if(!data) return;

    alert(data.mensaje || data.msg);

    cargarTabla('/solicitudes');
    })
    .catch(err => console.log(err));
        }

    function verificarLogin(){
    const token = localStorage.getItem("token");

    if(!token){
        window.location.href = "/login";
        return false;
    }

    return true;
}
    </script>
</body>
</html>
